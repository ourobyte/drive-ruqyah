    <style>

        body {

            background-color: #f1f5f9;
            color: #1e293b;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pdf-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pdf-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .pdf-card:active {
            transform: scale(0.97);
        }

        .shimmer {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .search-container focus-within {
            ring: 2px solid #2563eb;
        }
    </style>
</head>

        async function generateThumbnail(pdfUrl, canvasId) {
            const canvas = document.getElementById(canvasId);
            const container = canvas.parentElement;

            try {
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    disableAutoFetch: true,
                    disableStream: true
                });

                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 0.5 });
                const context = canvas.getContext('2d');
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
                
                container.classList.remove('shimmer');
                canvas.style.opacity = "1";
            } catch (error) {
                console.error("Gagal load:", error);
                container.classList.remove('shimmer');
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-300">
                        <i class="fa-solid fa-file-pdf text-4xl mb-2"></i>
                        <span class="text-[10px] uppercase font-bold tracking-widest">PDF Ready</span>
                    </div>
                `;
            }
        }

        function renderCatalog(filter = "") {
            const grid = document.getElementById('catalog-grid');
            const emptyState = document.getElementById('emptyState');
            const docCount = document.getElementById('docCount');
            
            const filteredData = pdfData.filter(item => 
                item.title.toLowerCase().includes(filter.toLowerCase())
            );

            docCount.innerText = `${filteredData.length} Materi`;

            if (filteredData.length === 0) {
                grid.innerHTML = "";
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = filteredData.map(item => `
                <div class="pdf-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden cursor-pointer flex flex-col" onclick="openPdf('${item.pdfUrl}')">
                    <div class="relative h-44 bg-slate-100 shimmer overflow-hidden">
                        <canvas id="thumb-${item.id}" class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></canvas>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <span class="bg-blue-600 text-white text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider">Halaman Utama</span>
                        </div>
                    </div>
                    <div class="p-6 flex items-start gap-4">
                        <div class="flex-1">
                            <h3 class="text-base font-bold text-slate-800 leading-snug line-clamp-2">${item.title}</h3>
                            <div class="flex items-center gap-2 mt-3">
                                <div class="bg-slate-100 px-2 py-1 rounded text-[10px] font-bold text-slate-500 uppercase">Syariat</div>
                                <div class="text-[10px] text-slate-400 font-medium italic">Klik untuk membaca</div>
                            </div>
                        </div>
                        <div class="bg-blue-50 w-10 h-10 rounded-2xl flex items-center justify-center text-blue-600 flex-shrink-0">
                            <i class="fa-solid fa-arrow-right-long"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            filteredData.forEach(item => {
                generateThumbnail(item.pdfUrl, `thumb-${item.id}`);
            });
        }

        function openPdf(url) {
            window.open(url, '_blank');
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCatalog(e.target.value);
        });

        window.onload = () => renderCatalog();
    </script>
