        async function generateThumbnail(pdfUrl, canvasId) {
            const canvas = document.getElementById(canvasId);
            const container = canvas.parentElement;

            try {
                // Menambahkan parameter untuk mencoba menghindari blokir CORS sederhana
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    disableAutoFetch: true,
                    disableStream: true
                });

                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 0.6 });
                const context = canvas.getContext('2d');
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                container.classList.remove('shimmer');
            } catch (error) {
                console.error("Gagal generate thumbnail:", error);
                container.classList.remove('shimmer');
                container.classList.add('error-placeholder');
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center px-4">
                        <i class="fa-solid fa-circle-exclamation text-3xl mb-2"></i>
                        <span class="text-[10px] font-bold uppercase">CORS / Network Error</span>
                        <p class="text-[9px] mt-1">Server storage Anda memblokir pratinjau otomatis.</p>
                    </div>
                `;
            }
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = pdfData.map(item => `
                <div class="pdf-card bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer" onclick="openPdf('${item.pdfUrl}')">
                    <div class="relative h-56 bg-slate-100 shimmer flex items-center justify-center overflow-hidden">
                        <canvas id="thumb-${item.id}" class="w-full h-full object-cover"></canvas>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                        <div class="absolute top-4 right-4">
                            <div class="bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm border border-white/20">
                                <span class="text-[10px] font-bold text-blue-600">HALAMAN 1</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-5 flex justify-between items-center">
                        <div class="flex-1 pr-4">
                            <h3 class="text-lg font-bold text-slate-800 line-clamp-1">${item.title}</h3>
                            <p class="text-sm text-slate-500 mt-1">${item.description}</p>
                        </div>
                        <div class="bg-blue-600 w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                            <i class="fa-solid fa-eye text-sm"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            pdfData.forEach(item => {
                generateThumbnail(item.pdfUrl, `thumb-${item.id}`);
            });
        }

        function openPdf(url) {
            // Membuka di tab baru seringkali menghindari masalah CORS browser untuk viewing
            window.open(url, '_blank');
        }

        window.onload = renderCatalog;
