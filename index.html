<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Ruqyah Digital - Terproteksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- PDF.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pdf-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pdf-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .pdf-card:active { transform: scale(0.97); }

        .shimmer {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Proteksi: Cegah select text dan print */
        .noselect {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @media print {
            body { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen noselect" oncontextmenu="return false;">

    <!-- ================= VIEW: LOGIN ================= -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md transform transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800">Akses Pustaka</h2>
                <p class="text-slate-500 text-sm mt-2">Silakan masukkan identitas dan token Anda untuk membaca materi.</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nama Lengkap</label>
                    <input type="text" id="inputNama" required placeholder="Cth: Ahmad Fulan"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Token Akses</label>
                    <input type="password" id="inputToken" required placeholder="Masukkan token rahasia"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                </div>
                
                <div id="loginError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Nama atau Token salah!</span>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <span>Masuk Pustaka</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ================= VIEW: MAIN DASHBOARD ================= -->
    <div id="main-view" class="hidden">
        <!-- Header & Navigation -->
        <header class="glass-header border-b sticky top-0 z-30 px-6 py-4">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-800 text-slate-900 tracking-tight">Pustaka <span class="text-blue-600">Ruqyah</span></h1>
                    <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">Edukasi Syar'iyyah</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs text-slate-500 font-medium">User Akses</p>
                        <p id="userNameDisplay" class="text-sm font-bold text-slate-800">Nama</p>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition-colors" title="Keluar">
                        <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto px-5 py-8">
            <!-- Welcome & Search -->
            <section class="mb-10 text-center md:text-left">
                <!-- Search Bar -->
                <div class="relative max-w-2xl">
                    <input type="text" id="searchInput" placeholder="Cari judul materi..." disabled
                        class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all disabled:bg-slate-50 disabled:cursor-not-allowed">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
            </section>

            <!-- Stats Brief -->
            <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar">
                <div class="bg-white px-4 py-2 rounded-xl border border-slate-100 flex items-center gap-2 whitespace-nowrap">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span id="docCount" class="text-sm font-bold text-slate-700">Memuat Data...</span>
                </div>
            </div>

            <!-- Grid Katalog -->
            <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data akan dimuat oleh JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-20 text-center">
                <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-box-open text-slate-400 text-xl"></i>
                </div>
                <p class="text-slate-500 font-medium">Materi tidak ditemukan...</p>
            </div>
        </main>

        <footer class="text-center py-10 opacity-50">
            <p class="text-xs font-medium text-slate-400">© 2024 Pustaka Ruqyah Digital - Terproteksi</p>
        </footer>
    </div>

    <!-- ================= VIEW: CUSTOM SECURE PDF VIEWER ================= -->
    <div id="pdf-viewer-overlay" class="hidden fixed inset-0 z-[100] bg-slate-900 flex flex-col h-screen overflow-hidden">
        <!-- Toolbar -->
        <div class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-4 text-white flex-shrink-0">
            <div class="flex items-center gap-3 w-1/3">
                <button onclick="closePdf()" class="w-10 h-10 rounded-full hover:bg-slate-700 flex items-center justify-center transition-colors text-slate-300">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <h3 id="pdf-title-display" class="font-medium text-sm truncate max-w-[200px] hidden md:block">Judul PDF</h3>
            </div>
            
            <div class="flex items-center justify-center gap-4 w-1/3">
                <button id="prevBtn" onclick="onPrevPage()" class="w-8 h-8 rounded hover:bg-slate-700 flex items-center justify-center disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <span class="text-sm font-medium bg-slate-700 px-3 py-1 rounded-lg">
                    <span id="page_num">1</span> / <span id="page_count">--</span>
                </span>
                <button id="nextBtn" onclick="onNextPage()" class="w-8 h-8 rounded hover:bg-slate-700 flex items-center justify-center disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <div class="w-1/3 flex justify-end">
                <!-- Watermark Kanan Atas -->
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved"></i> Protected
                </span>
            </div>
        </div>

        <!-- Render Area -->
        <div id="pdf-render-container" class="flex-1 overflow-auto bg-slate-950 flex justify-center p-4 relative">
            <div id="pdf-loading" class="absolute inset-0 flex items-center justify-center bg-slate-950 z-10">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i>
            </div>
            <canvas id="pdf-render" class="shadow-2xl rounded max-w-full h-auto object-contain"></canvas>
        </div>
    </div>

    <script>
        // Set worker pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfData = [];
        let currentUser = null;

        // ================= AUTHENTICATION LOGIC =================
        
        // Cek sesi login (di sessionStorage)
        window.addEventListener('DOMContentLoaded', () => {
            const savedSession = sessionStorage.getItem('pustaka_user');
            if(savedSession) {
                currentUser = JSON.parse(savedSession);
                showDashboard();
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            const nama = document.getElementById('inputNama').value.trim();
            const token = document.getElementById('inputToken').value.trim();
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('loginError');

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memverifikasi...';
            errorMsg.classList.add('hidden');

            try {
                // Fetch data.json dari root repository Anda
                const response = await fetch('data.json');
                
                // Fallback Mock Data jika file data.json belum dibuat di GitHub
                let validUsers = [];
                if(response.ok) {
                    validUsers = await response.json();
                } else {
                    console.warn('File data.json gagal diload, menggunakan data dummy untuk testing.');
                    validUsers = [
                        { nama: "Test", token: "123" }, // Dummy untuk ngetest
                        { nama: "Admin", token: "admin123" }
                    ];
                }

                // Cek pencocokan (case-insensitive)
                const userMatch = validUsers.find(u => 
                    u.nama.toLowerCase() === nama.toLowerCase() && u.token === token
                );

                if (userMatch) {
                    currentUser = userMatch;
                    sessionStorage.setItem('pustaka_user', JSON.stringify(currentUser));
                    showDashboard();
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Error fetching data.json", err);
                errorMsg.querySelector('span').innerText = "Terjadi kesalahan sistem. Coba lagi.";
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = '<span>Masuk Pustaka</span><i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        }

        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = currentUser.nama;
            
            // Fetch PDF list only after successful login
            if (pdfData.length === 0) fetchPdfData();
        }

        function logout() {
            sessionStorage.removeItem('pustaka_user');
            window.location.reload();
        }


        // ================= GITHUB FETCHING LOGIC =================

        async function fetchPdfData() {
            const repoOwner = 'ourobyte';
            const repoName = 'drive-ruqyah';
            const folderPath = 'assets';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
            const grid = document.getElementById('catalog-grid');
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Gagal mengambil data');
                
                const data = await response.json();
                pdfData = data
                    .filter(item => item.name.toLowerCase().endsWith('.pdf'))
                    .map((item, index) => ({
                        id: index + 1,
                        title: item.name.replace('.pdf', ''), 
                        pdfUrl: item.path
                    }));

                document.getElementById('searchInput').disabled = false;
                renderCatalog();
            } catch (error) {
                document.getElementById('docCount').innerText = "Gagal memuat";
                document.getElementById('docCount').previousElementSibling.classList.replace('bg-green-500', 'bg-red-500');
            }
        }

        function renderCatalog(filter = "") {
            const grid = document.getElementById('catalog-grid');
            const emptyState = document.getElementById('emptyState');
            const docCount = document.getElementById('docCount');
            
            const filteredData = pdfData.filter(item => 
                item.title.toLowerCase().includes(filter.toLowerCase())
            );

            docCount.innerText = `${filteredData.length} Materi`;

            if (filteredData.length === 0) {
                grid.innerHTML = "";
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = filteredData.map(item => `
                <div class="pdf-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden cursor-pointer flex flex-col shadow-sm hover:shadow-md" onclick="openSecurePdf('${item.pdfUrl}', '${item.title}')">
                    <div class="relative h-44 bg-slate-100 shimmer overflow-hidden">
                        <canvas id="thumb-${item.id}" class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></canvas>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4 flex gap-2">
                            <span class="bg-blue-600 text-white text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider shadow-sm">
                                <i class="fa-solid fa-lock text-[8px] mr-1"></i>Aman
                            </span>
                        </div>
                    </div>
                    <div class="p-6 flex items-start gap-4">
                        <div class="flex-1">
                            <h3 class="text-base font-bold text-slate-800 leading-snug line-clamp-2">${item.title}</h3>
                            <div class="flex items-center gap-2 mt-3">
                                <div class="text-[10px] text-slate-400 font-medium italic">Klik untuk membaca (Non-Download)</div>
                            </div>
                        </div>
                        <div class="bg-blue-50 w-10 h-10 rounded-2xl flex items-center justify-center text-blue-600 flex-shrink-0">
                            <i class="fa-solid fa-book-open"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            setTimeout(() => {
                filteredData.forEach(item => generateThumbnail(item.pdfUrl, `thumb-${item.id}`));
            }, 100);
        }

        async function generateThumbnail(pdfUrl, canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const container = canvas.parentElement;

            try {
                const loadingTask = pdfjsLib.getDocument({ url: pdfUrl, disableAutoFetch: true, disableStream: true });
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.5 });
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.classList.remove('shimmer');
                canvas.style.opacity = "1";
            } catch (error) {
                container.classList.remove('shimmer');
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-300"><i class="fa-solid fa-file-pdf text-4xl mb-2"></i></div>`;
            }
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCatalog(e.target.value);
        });


        // ================= SECURE PDF VIEWER LOGIC =================
        
        let currentPdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            scale = 1.5, // Scale diperbesar agar jernih saat dibaca
            canvas = document.getElementById('pdf-render'),
            ctx = canvas.getContext('2d');

        async function openSecurePdf(url, title) {
            document.getElementById('pdf-viewer-overlay').classList.remove('hidden');
            document.getElementById('pdf-title-display').innerText = title;
            document.getElementById('pdf-loading').classList.remove('hidden');
            canvas.style.opacity = '0';

            try {
                currentPdfDoc = await pdfjsLib.getDocument(url).promise;
                document.getElementById('page_count').textContent = currentPdfDoc.numPages;
                pageNum = 1;
                renderPage(pageNum);
            } catch (error) {
                alert("Gagal memuat PDF. Terjadi masalah jaringan.");
                closePdf();
            }
        }

        function closePdf() {
            document.getElementById('pdf-viewer-overlay').classList.add('hidden');
            currentPdfDoc = null;
        }

        function renderPage(num) {
            pageRendering = true;
            currentPdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    pageRendering = false;
                    document.getElementById('pdf-loading').classList.add('hidden');
                    canvas.style.opacity = '1';
                    
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page_num').textContent = num;
            updateButtons();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (pageNum >= currentPdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = pageNum <= 1;
            document.getElementById('nextBtn').disabled = currentPdfDoc ? pageNum >= currentPdfDoc.numPages : true;
        }

        // ================= ANTI-THEFT MEASURES =================

        // Blokir Ctrl+P (Print), Ctrl+S (Save), Ctrl+U (Source)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                const key = e.key.toLowerCase();
                if (key === 'p' || key === 's' || key === 'u' || key === 'c') {
                    e.preventDefault();
                    console.warn("Aksi ini tidak diizinkan di Pustaka.");
                }
            }
        });

    </script>
</body>
</html>
