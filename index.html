<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Ruqyah Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pdf-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pdf-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .pdf-card:active {
            transform: scale(0.97);
        }

        .shimmer {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .search-container:focus-within {
            ring: 2px solid #2563eb;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header & Navigation -->
    <header class="glass-header border-b sticky top-0 z-30 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-800 text-slate-900 tracking-tight">Pustaka <span class="text-blue-600">Ruqyah</span></h1>
                <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">Edukasi Syar'iyyah</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-5 py-8">
        
        <!-- Welcome & Search -->
        <section class="mb-10 text-center md:text-left">
            <!-- Search Bar -->
            <div class="relative max-w-2xl">
                <input type="text" id="searchInput" placeholder="Cari judul materi..." disabled
                    class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all disabled:bg-slate-50 disabled:cursor-not-allowed">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
        </section>

        <!-- Stats Brief -->
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <div class="bg-white px-4 py-2 rounded-xl border border-slate-100 flex items-center gap-2 whitespace-nowrap">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span id="docCount" class="text-sm font-bold text-slate-700">Memuat Data...</span>
            </div>
        </div>

        <!-- Grid Katalog -->
        <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Data akan dimuat oleh JavaScript -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-20 text-center">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-box-open text-slate-400 text-xl"></i>
            </div>
            <p class="text-slate-500 font-medium">Materi tidak ditemukan...</p>
        </div>

    </main>

    <!-- Footer Content Info -->
    <footer class="text-center py-10 opacity-50">
        <p class="text-xs font-medium text-slate-400">© 2024 Pustaka Ruqyah Digital</p>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Variabel global untuk menyimpan data dari GitHub
        let pdfData = [];

        // Fungsi untuk mengambil data file dari GitHub API
        async function fetchPdfData() {
            const repoOwner = 'ourobyte';
            const repoName = 'drive-ruqyah';
            const folderPath = 'assets';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
            
            const grid = document.getElementById('catalog-grid');
            
            // Tampilkan loading skeleton
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-12 text-slate-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i>
                    <p class="text-sm font-medium">Menyinkronkan pustaka dari server...</p>
                </div>
            `;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Gagal mengambil data dari GitHub');
                
                const data = await response.json();
                
                // Filter hanya file PDF dan mapping ke struktur yang kita butuhkan
                pdfData = data
                    .filter(item => item.name.toLowerCase().endsWith('.pdf'))
                    .map((item, index) => ({
                        id: index + 1,
                        title: item.name.replace('.pdf', ''), // Hapus ekstensi .pdf untuk judul
                        pdfUrl: item.path // Karena index.html di root, path 'assets/...' sudah benar
                    }));

                // Aktifkan kolom pencarian
                document.getElementById('searchInput').disabled = false;
                
                // Render katalog setelah data siap
                renderCatalog();
                
            } catch (error) {
                console.error("Error fetching PDF list:", error);
                document.getElementById('docCount').innerText = "Gagal memuat";
                document.getElementById('docCount').previousElementSibling.classList.replace('bg-green-500', 'bg-red-500');
                
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-red-50 rounded-2xl border border-red-100">
                        <i class="fa-solid fa-triangle-exclamation text-red-400 text-3xl mb-2"></i>
                        <h3 class="text-red-800 font-bold mb-1">Gagal Memuat Data</h3>
                        <p class="text-red-600 text-sm">Pastikan koneksi internet stabil. Limit API GitHub mungkin tercapai.</p>
                        <button onclick="fetchPdfData()" class="mt-4 px-4 py-2 bg-red-100 text-red-700 text-sm font-semibold rounded-lg hover:bg-red-200 transition">Coba Lagi</button>
                    </div>
                `;
            }
        }

        async function generateThumbnail(pdfUrl, canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const container = canvas.parentElement;

            try {
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    disableAutoFetch: true,
                    disableStream: true
                });

                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 0.5 });
                const context = canvas.getContext('2d');
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
                
                container.classList.remove('shimmer');
                canvas.style.opacity = "1";
            } catch (error) {
                console.error("Gagal load thumbnail untuk:", pdfUrl, error);
                container.classList.remove('shimmer');
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-300">
                        <i class="fa-solid fa-file-pdf text-4xl mb-2"></i>
                        <span class="text-[10px] uppercase font-bold tracking-widest text-center px-2">PDF Ready<br>(Thumbnail Gagal)</span>
                    </div>
                `;
            }
        }

        function renderCatalog(filter = "") {
            const grid = document.getElementById('catalog-grid');
            const emptyState = document.getElementById('emptyState');
            const docCount = document.getElementById('docCount');
            
            const filteredData = pdfData.filter(item => 
                item.title.toLowerCase().includes(filter.toLowerCase())
            );

            docCount.innerText = `${filteredData.length} Materi`;

            if (filteredData.length === 0) {
                grid.innerHTML = "";
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = filteredData.map(item => `
                <div class="pdf-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden cursor-pointer flex flex-col shadow-sm hover:shadow-md" onclick="openPdf('${item.pdfUrl}')">
                    <div class="relative h-44 bg-slate-100 shimmer overflow-hidden">
                        <canvas id="thumb-${item.id}" class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></canvas>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <span class="bg-blue-600 text-white text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider shadow-sm">Halaman Utama</span>
                        </div>
                    </div>
                    <div class="p-6 flex items-start gap-4">
                        <div class="flex-1">
                            <h3 class="text-base font-bold text-slate-800 leading-snug line-clamp-2" title="${item.title}">${item.title}</h3>
                            <div class="flex items-center gap-2 mt-3">
                                <div class="bg-slate-100 px-2 py-1 rounded text-[10px] font-bold text-slate-500 uppercase">Syariat</div>
                                <div class="text-[10px] text-slate-400 font-medium italic">Klik untuk membaca</div>
                            </div>
                        </div>
                        <div class="bg-blue-50 w-10 h-10 rounded-2xl flex items-center justify-center text-blue-600 flex-shrink-0">
                            <i class="fa-solid fa-arrow-right-long"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            // Delay render thumbnail agar tidak memblokir render UI
            setTimeout(() => {
                filteredData.forEach(item => {
                    generateThumbnail(item.pdfUrl, `thumb-${item.id}`);
                });
            }, 100);
        }

        function openPdf(url) {
            // Membuka PDF di tab baru
            window.open(url, '_blank');
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCatalog(e.target.value);
        });

        // Jalankan fetch saat halaman dimuat
        window.onload = () => {
            fetchPdfData();
        };
    </script>
</body>
</html>
